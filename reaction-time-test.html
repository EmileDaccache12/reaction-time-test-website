<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emiles's Reaction Time Test/home</title>

    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
        }

        #title {
            border-bottom: 4px solid black;
            font-size: 500%;
            font-weight: bolder;
            text-align: center;
            margin-top: 5px;
        }

        #content {
            display: flex;
            justify-content: center;
        }

        #start {
            margin-top: 150px;
            font-size: 300%;
            padding: 40px;
            border-radius: 50%;
            border: 3px solid black;
            background-color: rgb(201, 0, 0);
        }

        #start:hover {
            cursor: pointer;
            transform: scale(1.03);
            background-color: rgb(225, 0, 0);
        }

        @media (max-width: 555px) {
            #title {
                font-size: 300%;
            }

            #start {
                font-size: 250%;
            }
        }
    </style>
</head>
<body>
    <h1 id="title">Emile's Reaction Time Test</h1>

    <div id="content">
        <a href="reaction-time-test-start.html">
            <button id="start">Click To Go To<br>The Test</button>
        </a>
    </div>
</body>
</html>

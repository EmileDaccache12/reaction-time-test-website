<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emile's Reaction Time Test/start</title>

    <style>
        body {
            background-color: blue;
            font-family: Arial, Helvetica, sans-serif;
            text-align: center;
        }
        
        #intro {
            display: flex;
            justify-content: center;
        }
        
        #start {
            position: relative;
            background: none;
            border: none;
            width: 100%;
            height: 90vh;
        }

        #text {
            font-size: 400%;
            font-weight: bold;
        }

        #home {
            font-weight: bold;
            background-color: rgb(214, 0, 0);
            font-size: 160%;
            padding: 7px;
        }

        #home:hover {
            transform: scale(1.0272);
            cursor: pointer;
            background-color: rgb(170, 0, 0);
        }

        #restart-btn {
            background-color: rgb(214, 0, 0);
            font-weight: bold;
            font-size: 300%;
            position: absolute;
            margin-top: 450px;
            display: none;
        }

        #restart-btn:hover {
            transform: scale(1.0273);
            background-color: rgb(170, 0, 0);
        }

        #restart-icon {
            width: 80px;
            position: static;
            margin: auto;
            display: none;
        }

        #restart-icon:hover {
            cursor: pointer;
            transform: scale(1.012);
        }

        @media (max-width: 600px) {
            #text {
                font-size: 300%;
            }
        }
    </style>

    <script>
        document.addEventListener("DOMContentLoaded" , () => {
            const start = document.getElementById("start");
            const body = document.body;
            let started = false;
            const restart_btn = document.getElementById("restart-btn");
            const restart_icon = document.getElementById("restart-icon");

            let timer = 0;

            start.addEventListener("click" , function () {
                if (started) return;
                started = true

                const random = Math.floor(Math.random() * 4501) + 3000;

                body.style.backgroundColor = "rgb(170, 0, 0)";

                const text = document.getElementById("text");
                text.innerHTML = "Tap The Screen When<br>It turns green";

                start.addEventListener("click" , function() {
                    if (body.style.backgroundColor === "rgb(170, 0, 0)") {
                        text.innerHTML = "You Failed";
                        clearTimeout(timeout);
                        restart_btn.style.display = "block";
                    }
                });
                

                const timeout = setTimeout (() => {
                    body.style.backgroundColor = "rgb(0, 170, 50)"
                const interval = setInterval (() => {
                    timer = timer + 0.01;

                    text.innerHTML = timer.toFixed(2);
                }, 10);
                if (body.style.backgroundColor === "rgb(0, 170, 50)") {
                    started = true;
                    start.addEventListener("click" , function() {
                        clearInterval(interval);
                        restart_icon.style.display = "block";
                    });
                }
                }, random);
            });
            restart_btn.addEventListener("click" , function() {
                location.reload();
            });
            restart_icon.addEventListener("click" , function() {
                location.reload();
            });
        });
    </script>
</head>
<body>
    <a href="reaction-time-test.html">
        <button id="home">Return To Home</button>
    </a>

    <div id="intro">
        <button id="start">
            <img src="restart-icon.png" alt="restart icon" id="restart-icon">
            <br><br><br>

            <h1 id="text">Click Anywhere On The Screen To start The test</h1>

            <button id="restart-btn">Restart</button>
        </button>
    </div>
</body>
</html>

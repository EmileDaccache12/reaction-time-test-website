<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emile's Reaction Time Test/start</title>

    <style>
        body {
            background-color: blue;
            font-family: Arial, Helvetica, sans-serif;
            text-align: center;
        }
        
        #intro {
            display: flex;
            justify-content: center;
        }
        
        #start {
            background: none;
            border: none;
            width: 100%;
            height: 90vh;
        }

        #text {
            font-size: xx-large;
            font-weight: bold;
        }

        #home {
            font-weight: bold;
            background-color: brown;
            font-size: 160%;
            padding: 7px;
        }

        #home:hover {
            transform: scale(1.0272);
            cursor: pointer;
            background-color: rgb(200, 47, 47);
        }
    </style>

    <script>
        document.addEventListener("DOMContentLoaded" , () => {
            const start = document.getElementById("start");

            start.addEventListener("click" , function () {
                document.body.style.backgroundColor = "red";

                const text = document.getElementById("text");
                text.innerHTML = "Tap The Screen When<br>It turns green";

                setInterval (() => {
                    document.body.style.backgroundColor = "rgb(0, 225, 0)"
                    text.innerHTML = "GO!"
                }, 5000);
            });
        })
    </script>
</head>
<body>
    <a href="reaction-time-test.html">
        <button id="home">Return To Home</button>
    </a>

    <div id="intro">
        <button id="start">
            <h1 id="text">Click Anywhere On The Screen To start The test</h1>
        </button>
    </div>
</body>
</html>
